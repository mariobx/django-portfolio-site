name: Deploy Static Site

on:
  workflow_dispatch:
  # Optional: Uncomment below to run every time you push to your source repo
  # push:
  #   branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 is required for the sitemap to read git history 
          # for the "lastmod" (last modified) dates.
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Secret Key Placeholder
        run: |
          mkdir -p config
          echo "github-actions-placeholder-key" > config/.secret

      - name: Collect Static
        run: python manage.py collectstatic --noinput

      - name: Export Static Site
        run: |
          # Increase git buffer for the runner to handle large uploads
          git config --global http.postBuffer 524288000
          python manage.py distill-local output --force

      - name: Generate XML Sitemap
        uses: cicirello/generate-sitemap@v1
        with:
          # Tells the action to look inside the folder Django just built
          path-to-root: output
          base-url-path: https://mariobx.github.io/
          drop-html-extension: true
          include-pdf: true
          # This saves sitemap.xml directly into the output folder for deployment
          sitemap-path: output/sitemap.xml

      - name: Deploy to Website Repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          external_repository: mariobx/mariobx.github.io
          publish_dir: ./output
          publish_branch: main
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: "Automated deployment with Sitemap"
          force_orphan: true
