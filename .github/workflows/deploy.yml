name: Deploy Static Site

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        # LFS removed

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Secret Key Placeholder
        run: |
          mkdir -p config
          echo "github-actions-placeholder-key" > config/.secret

      - name: Collect Static
        run: python manage.py collectstatic --noinput

      - name: Export Static Site
        run: |
          # Increase git buffer for the runner to handle large uploads
          git config --global http.postBuffer 524288000
          python manage.py distill-local output --force

      - name: Deploy to Website Repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          external_repository: mariobx/mariobx.github.io
          publish_dir: ./output
          publish_branch: main
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: "Automated deployment"
          force_orphan: true
