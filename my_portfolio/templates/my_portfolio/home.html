{% extends "my_portfolio/base.html" %}

{% block content %}
<div class="home-container" style="padding-top: 3rem; width: 100%;">
    {% if home_content %}
        <h1 style="font-size: 2.6rem; margin-bottom: 1.5rem; font-weight: 700; color: #fff;">
            {{ home_content.name }}
        </h1>
        <div class="home-description" style="font-size: 1.2rem; line-height: 1.6; color: #ccc;">
            {{ home_content.description|safe|linebreaks }}
        </div>
    {% else %}
        <h1 style="font-size: 2.6rem; margin-bottom: 1.5rem; font-weight: 700; color: #fff;">
            Mario Marku
        </h1>
        <p style="font-size: 1.2rem; color: #ccc;">Welcome to my portfolio. Please configure the home page content in the Django Admin.</p>
    {% endif %}
</div>
{% endblock %}
